# HPC experiment template — extends MVP settings
corpus:
  data_dir: "data/synthetic_enterprise/clean_corpus"
  processed_dir: "data/processed"

chunking:
  chunk_size: 300
  chunk_overlap: 50
  min_chunk_size: 50

embedding:
  provider: "tfidf"
  model_name: "all-MiniLM-L6-v2"
  batch_size: 32
  dimension: 384

vector_store:
  provider: "memory"
  index_path: "data/processed/faiss_index"

retrieval:
  top_k: 5

llm:
  provider: "mock"
  model_name: "mock-llm-v1"
  temperature: 0.0
  max_tokens: 512

risk_scoring:
  weights:
    instruction: 0.25
    sensitive: 0.25
    retrieval_anomaly: 0.15
    conflict: 0.15
    coordination: 0.10
    stance_shift: 0.10
  thresholds:
    suspicious: 0.60
    high_risk: 0.80

influence:
  method: "riaa"
  enable_pairwise: true
  max_pairwise_tests: 6
  pairwise_threshold: 0.15
  risk_filter_threshold: 0.40
  calibrator_path: "data/processed/harmfulness_calibrator.pkl"

repair:
  max_replacement_chunks: 3
  source_diversity_min: 2

verification:
  pass_threshold: 0.60
  certified_smoothing:
    enabled: true
    num_samples: 6
    subset_fraction: 0.75
    confidence_alpha: 0.05
    stability_threshold: 0.55

outputs:
  base_dir: "outputs"
  answers_dir: "outputs/answers"
  certificates_dir: "outputs/certificates"
  provenance_dir: "outputs/provenance_graphs"
  results_dir: "outputs/experiment_results"
  reports_dir: "outputs/reports"
  hpc_runs_dir: "outputs/hpc_runs"
  cache_dir: "cache"
