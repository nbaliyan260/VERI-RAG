# LLM profiles for experiments — set llm_profile in experiment config or CLI
profiles:
  mock:
    provider: mock
    model_name: mock-llm-v1
    temperature: 0.0
    max_tokens: 512

  openai:
    provider: openai
    model_name: gpt-4o-mini
    temperature: 0.0
    max_tokens: 512

  openai_gpt4:
    provider: openai
    model_name: gpt-4o
    temperature: 0.0
    max_tokens: 512

  ollama_llama:
    provider: ollama
    model_name: llama3
    temperature: 0.0
    max_tokens: 512

  ollama_mistral:
    provider: ollama
    model_name: mistral
    temperature: 0.0
    max_tokens: 512

default_profile: mock
